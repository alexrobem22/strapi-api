version: '3.8'

services:
  db_blog_strapi:
    image: mysql:8.0
    container_name: mysql_blog_strapi
    # restart: always
    environment:
      MYSQL_DATABASE: blog_strapi
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo 
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  db_data:
